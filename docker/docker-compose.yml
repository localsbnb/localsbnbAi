version: '3.8'

services:
  lukeyun-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: localsbnb-mcp-server
    environment:
      - NODE_ENV=production
      - LUKEYUN_API_BASE_URL=${LUKEYUN_API_BASE_URL:-https://api.lukeyun.com}
      - LUKEYUN_API_KEY=${LUKEYUN_API_KEY}
      - LUKEYUN_API_SCOPES=${LUKEYUN_API_SCOPES:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    stdin_open: true
    tty: true
